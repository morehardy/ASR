name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip uv twine

      - name: Check release tag format
        if: github.event_name == 'release' || github.event_name == 'workflow_dispatch'
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          TAG_NAME: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re

          event_name = os.environ["EVENT_NAME"]
          ref_type = os.environ["REF_TYPE"]
          tag_name = os.environ["TAG_NAME"]

          if event_name == "workflow_dispatch" and ref_type != "tag":
              raise SystemExit(
                  "Manual PyPI publishing must run from a release tag such as 'v0.2.1'."
              )
          if not re.fullmatch(r"v\d+\.\d+\.\d+(?:[a-zA-Z0-9.-]+)?", tag_name):
              raise SystemExit(
                  f"Release tag {tag_name!r} must look like 'vX.Y.Z', for example 'v0.2.1'."
              )
          print(f"Release tag {tag_name} is valid.")
          PY

      - name: Run tests
        run: PYTHONPATH=src uv run --frozen --python 3.14 python -m unittest discover -s tests -p 'test_*.py'

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/echoalign-asr-mlx
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
