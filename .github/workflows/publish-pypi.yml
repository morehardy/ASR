name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-pypi-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install build tools
        run: python -m pip install --upgrade pip uv twine

      - name: Check release tag matches package version
        if: github.event_name == 'release'
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          release_tag = os.environ["RELEASE_TAG"]
          version = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          expected_tag = f"v{version}"
          if release_tag != expected_tag:
              raise SystemExit(
                  f"Release tag {release_tag!r} must match pyproject.toml version {version!r}; "
                  f"use tag {expected_tag!r} or bump the package version."
              )
          print(f"Release tag {release_tag} matches package version {version}.")
          PY

      - name: Run tests
        run: PYTHONPATH=src uv run --frozen --python 3.14 python -m unittest discover -s tests -p 'test_*.py'

      - name: Build distributions
        run: uv build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Store distributions
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish distribution to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/echoalign-asr-mlx
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
